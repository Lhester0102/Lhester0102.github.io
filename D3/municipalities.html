<!DOCTYPE html>
<html lang="en">
<head>

<body class="bg-light vh-100 d-flex">

<!-- SIDEBAR -->

                 class=" w-75 border border-light img-fluid rounded-circle mb-2">

        </div>

        <hr class="border-light">

        <ul class="nav nav-pills flex-column mb-auto">

            <li class="nav-item">
                <a href="main.html" class="nav-link text-white">
                    <span class="bi bi-speedometer2 me-2"></span> Dashboard
                </a>
            </li>

            <!-- MAP ACTIVE -->
            <li class="nav-item">
                <a href="index.html" class="nav-link text-white ">
                    <span class="bi bi-map me-2"></span> Map
                </a>
            </li>

            <!-- Dropdown Manage -->
            <li class="nav-item">
                <a class="nav-link text-white active bg-dark" data-bs-toggle="collapse" href="#manageMenu">
                    <span class="bi bi-gear me-2"></span> Manage
                    <span class="bi bi-chevron-down float-end"></span>
                </a>
                <div class="collapse p-1" id="manageMenu">
                    <ul class="list-unstyled ps-3 small mb-0">
                        <li>
                            <a href="municipalities.html" class="nav-link text-white active bg-dark">
                                <span class="bi bi-building me-2"></span> Municipalities
                            </a>
                        </li>
                        <li>
                            <a href="upload2.html" class="nav-link text-white">
                                <span class="bi bi-upload me-2"></span> Upload GeoJSON
                            </a>
                        </li>
                    </ul>
                </div>

            <li class="nav-item mt-2">
                <a href="log.html" class="nav-link text-white">
                    <span class="bi bi-box-arrow-in-right me-2"></span> Logout
                </a>
            </li>

        </ul>

    </div>

<!-- MAIN CONTENT -->
<div class="flex-grow-1 d-flex flex-column p-2">

  <!-- TOPBAR WITH DROPDOWN -->
  <div class="bg-white rounded shadow-sm p-2 mb-2 d-flex justify-content-between align-items-center">

    <h6 class="mb-0">Municipal Boundaries Map</h6>

    <!-- DROPDOWN RIGHT CORNER -->
    <div class="dropdown">
      <button class="btn btn-outline-primary btn-sm dropdown-toggle"
              data-bs-toggle="dropdown">
        Select Municipality
      </button>

      <ul class="dropdown-menu dropdown-menu-end"
          id="areaDropdown"
          style="max-height:300px; overflow:auto;">
      </ul>
    </div>

  </div>

  <!-- MAP FULL -->
  <div class="card shadow-sm flex-grow-1">
    <div class="card-body p-1 h-100">
      <div id="map" class="w-100 h-100 rounded"></div>
    </div>
  </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBcayr5NOjbrAuLn7bkUovRWVyG4O9wMPk",
  authDomain: "flooded-95eeb.firebaseapp.com",
  projectId: "flooded-95eeb",
  storageBucket: "flooded-95eeb.firebasestorage.app",
  messagingSenderId: "142547476223",
  appId: "1:142547476223:web:70de7014c664e26d0636ca",
  measurementId: "G-MRFYTR1F5K"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Mapbox Init
mapboxgl.accessToken = 'pk.eyJ1IjoibGhlc3RlcjA4IiwiYSI6ImNtaHFmc3BncjBwZGQybHM0NWN3ejNoNnIifQ.2kEE1OBDTgpnse5-F8QGeg';
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/lhester08/cmhqgzq0r004601su4m8i8ov1',
  center: [120.716062, 18.106858],
  zoom: 9.5,
  pitch: 55
});
map.addControl(new mapboxgl.NavigationControl());

// ================= HELPERS =================
function getColor(v) {
  if (v >= 80) return '#800026';
  if (v >= 60) return '#BD0026';
  if (v >= 40) return '#E31A1C';
  if (v >= 20) return '#FC4E2A';
  return '#28a745';
}

function getCentroid(coords) {
  let flat = coords.flat(3);
  let lons = flat.filter((_, i) => i % 2 === 0);
  let lats = flat.filter((_, i) => i % 2 === 1);

  return [
    lons.reduce((a,b)=>a+b,0)/lons.length,
    lats.reduce((a,b)=>a+b,0)/lats.length
  ];
}

// ================= STATE =================
let currentLayerId = null;

// ================= SHOW AREA =================
function showArea(key, f){

  if (!f.geojson) return;

  if (currentLayerId) {
    if (map.getLayer(currentLayerId)) map.removeLayer(currentLayerId);
    if (map.getSource(currentLayerId)) map.removeSource(currentLayerId);
  }

  currentLayerId = 'area-' + key;

  map.addSource(currentLayerId, {
    type: 'geojson',
    data: f.geojson
  });

  map.addLayer({
    id: currentLayerId,
    type: 'fill',
    source: currentLayerId,
    paint: {
      'fill-color': getColor(f.vulnerability || 0),
      'fill-opacity': 0.5
    }
  });

  let coords = f.geojson.type === "Feature"
    ? f.geojson.geometry.coordinates
    : f.geojson.features[0].geometry.coordinates;

  let center = getCentroid(coords);

  map.flyTo({
    center: center,
    zoom: 11,
    essential: true
  });
}

// ================= LOAD DATA =================
db.ref('Flooded_Areas').on('value', snapshot => {

  const data = snapshot.val();
  const dropdown = document.getElementById('areaDropdown');

  dropdown.innerHTML = '';

  if (!data) return;

  Object.keys(data).forEach(key => {

    const f = data[key];
    if (!f.geojson) return;

    const item = document.createElement('li');
    if(f.name!="Flooded Areas"){
 item.innerHTML = `<a class="dropdown-item" href="#">${f.name}</a>`;
    }
   

    item.onclick = () => showArea(key, f);

    dropdown.appendChild(item);
  });
});
</script>

</body>
</html>
