<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Geospatial DSS - Upload</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<!-- Mapbox -->
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<style>
html, body { height:100%; margin:0; overflow:hidden; }
#map { width:100%; height:100%; border-radius:8px; }
</style>
</head>

<body class="bg-light vh-100 d-flex">

<!-- SIDEBAR -->
    <div style="background-color:#800000; width:250px;" class="text-white p-2 d-flex flex-column">

        <!-- Logo + Title -->
        <div class="text-center mb-3">
            <img src="flood.png"
                 class=" w-75 border border-light img-fluid rounded-circle mb-2">
            <h6 class="mb-0">Geospatial DSS</h6>
            <small>Flood Monitoring</small>
        </div>

        <hr class="border-light">

        <ul class="nav nav-pills flex-column mb-auto">

            <li class="nav-item">
                <a href="main.html" class="nav-link text-white">
                    <span class="bi bi-speedometer2 me-2"></span> Dashboard
                </a>
            </li>

            <!-- MAP ACTIVE -->
            <li class="nav-item">
                <a href="index.html" class="nav-link text-white ">
                    <span class="bi bi-map me-2"></span> Map
                </a>
            </li>

            <!-- Dropdown Manage -->
            <li class="nav-item">
                <a class="nav-link text-white active bg-dark" data-bs-toggle="collapse" href="#manageMenu">
                    <span class="bi bi-gear me-2"></span> Manage
                    <span class="bi bi-chevron-down float-end"></span>
                </a>
                <div class="collapse p-1" id="manageMenu">
                    <ul class="list-unstyled ps-3 small mb-0">
                        <li>
                            <a href="municipalities.html" class="nav-link text-white ">
                                <span class="bi bi-building me-2"></span> Municipalities
                            </a>
                        </li>
                        <li>
                            <a href="upload2.html" class="nav-link text-white active bg-dark">
                                <span class="bi bi-upload me-2"></span> Upload GeoJSON
                            </a>
                        </li>
                    </ul>
                </div>
            </li>

            <li class="nav-item mt-2">
                <a href="log.html" class="nav-link text-white">
                    <span class="bi bi-box-arrow-in-right me-2"></span> Logout
                </a>
            </li>

        </ul>

    </div>
  <!-- MAIN -->
  <div class="flex-grow-1 p-2">

    <!-- TOPBAR -->
    <div class="bg-white p-2 rounded shadow-sm mb-2">
      <h6 class="mb-0">Upload GeoJSON to Flood Database</h6>
    </div>

    <!-- CONTENT -->
    <div class="row g-2 h-100">

      <!-- LEFT PANEL -->
      <div class="col-lg-4 h-100">
        <div class="card shadow-sm ">
          <div class="card-body d-flex flex-column">

            <h6 class="fw-bold mb-3">GeoJSON Details</h6>

            <input id="name" class="form-control mb-2" placeholder="Name">

            <input id="type" class="form-control mb-2" value="Municipality">

            <input id="vulnerability" type="number"
                   class="form-control mb-2"
                   placeholder="Vulnerability (0-100)">

            <input id="note" class="form-control mb-2" placeholder="Note">

            <input id="file" type="file" class="form-control mb-2">

            <div id="status" class="small text-muted mb-2">No upload yet</div>

            <button id="uploadBtn" class="btn btn-primary w-100 mt-auto">
              Upload to Firebase
            </button>

          </div>
        </div>
      </div>

      <!-- MAP -->
      <div class="col-lg-8 h-100">
        <div class="card shadow-sm h-100">
          <div class="card-body p-1 h-100">
            <div id="map"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- SCRIPTS -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBcayr5NOjbrAuLn7bkUovRWVyG4O9wMPk",
  authDomain: "flooded-95eeb.firebaseapp.com",
  projectId: "flooded-95eeb",
  storageBucket: "flooded-95eeb.firebasestorage.app",
  messagingSenderId: "142547476223",
  appId: "1:142547476223:web:70de7014c664e26d0636ca"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Mapbox Init
mapboxgl.accessToken = 'pk.eyJ1IjoibGhlc3RlcjA4IiwiYSI6ImNtaHFmc3BncjBwZGQybHM0NWN3ejNoNnIifQ.2kEE1OBDTgpnse5-F8QGeg';
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/lhester08/cmhqgzq0r004601su4m8i8ov1',
  center: [120.716062, 18.106858],
  zoom: 9.5,
  pitch: 55
});
map.addControl(new mapboxgl.NavigationControl());

let previewLayerId = null;

// PREVIEW GEOJSON
document.getElementById('file').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  const geo = JSON.parse(await file.text());

  if(previewLayerId){
    if(map.getLayer(previewLayerId)) map.removeLayer(previewLayerId);
    if(map.getSource(previewLayerId)) map.removeSource(previewLayerId);
  }

  previewLayerId = 'preview';

  map.addSource(previewLayerId,{type:'geojson',data:geo});
  map.addLayer({
    id:previewLayerId,
    type:'fill',
    source:previewLayerId,
    paint:{'fill-color':'#007bff','fill-opacity':0.5}
  });

  document.getElementById('status').innerText="Preview loaded ✔";
});

// UPLOAD
document.getElementById('uploadBtn').onclick = async ()=>{
  const file = document.getElementById('file').files[0];
  if(!file) return alert("Select file");

  const geojson = JSON.parse(await file.text());

  await db.ref('Flooded_Areas').push({
    name: document.getElementById('name').value,
    type: document.getElementById('type').value,
    vulnerability: Number(document.getElementById('vulnerability').value),
    note: document.getElementById('note').value,
    geojson
  });

  document.getElementById('status').innerText="Upload successful ✔";
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
