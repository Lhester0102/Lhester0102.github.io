<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geospatial DSS | User Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="GDSS.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* Theme Core */
        body { background: #f4f6f9; min-height: 100vh; overflow-x: hidden; }
        
        /* Sidebar Styles */
        .sidebar { 
            background-color: #800000; 
            transition: all 0.3s;
            z-index: 1050;
            overflow-y: auto;
        }

        .nav-link { 
            color: rgba(255,255,255,0.8); 
            transition: 0.2s; 
            border-radius: 5px; 
            margin-bottom: 2px; 
        }

        .nav-link:hover { 
            background-color: #212529; 
            color: #fff; 
        }

        .nav-link.active { 
            background-color: #212529 !important; 
            color: white !important; 
        }
        
        /* Card & UI Refinement */
        .card { border: none; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-header { border-top-left-radius: 14px !important; border-top-right-radius: 14px !important; font-weight: bold; }
        
        /* Table Aesthetics */
        .table thead th { 
            background-color: #212529; 
            color: white; 
            font-size: 0.85rem;
            padding: 12px;
        }

        /* Responsive Layout Logic */
        @media (min-width: 768px) {
            .sidebar { min-height: 100vh; height: 100vh; }
            .main-content { height: 100vh; overflow-y: auto; }
        }

        /* Small Sidebar Branding for Mobile */
        .mobile-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        .mobile-brand img { width: 35px; height: 35px; }
        .mobile-brand h6 { margin: 0; font-size: 0.9rem; font-weight: bold; }

        /* Custom Scrollbar */
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">
        
        <nav class="col-lg-2 col-md-3 text-white p-3 sidebar collapse d-md-block" id="sidebarMenu">
            
            <div class="d-md-none mobile-brand">
                <img src="gds.png" class="rounded-circle border border-light" alt="Logo">
                <div>
                    <h6 class="text-white">Geospatial DSS</h6>
                    <small class="text-white-50" style="font-size: 0.7rem;">User Management</small>
                </div>
                <button class="btn btn-link text-white ms-auto p-0" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <div class="text-center mb-4 d-none d-md-block">
                <img src="gds.png" class="rounded-circle w-75 mb-2 border shadow-sm" alt="Logo">
                <h6 class="fw-bold mb-0">Geospatial DSS</h6>
                <!-- <small class="opacity-75">Admin Portal</small> -->
            </div>
            
            <ul class="nav flex-column">
                <li class="mb-1"><a class="nav-link text-white" href="newd.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li class="mb-1"><a class="nav-link text-white" href="index.html"><i class="bi bi-map me-2"></i>Map Overlay</a></li>
                
                <li class="nav-item">
                    <a class="nav-link text-white" data-bs-toggle="collapse" href="#manageMenu">
                        <i class="bi bi-gear me-2"></i> Manage <i class="bi bi-chevron-down float-end"></i>
                    </a>
                    <div class="collapse" id="manageMenu">
                        <ul class="list-unstyled ps-3 small">
                            <li><a href="municipalities.html" class="nav-link text-white-50 py-1">Municipalities</a></li>
                            <li><a href="upload2.html" class="nav-link text-white-50 py-1">Upload GeoJSON</a></li>
                        </ul>
                    </div>
                </li>
                <li class="mb-1"><a class="nav-link text-white active" href="users.html"><i class="bi bi-people me-2"></i>Users</a></li>
                <li class="mb-1"><a class="nav-link text-white" href="reports.html"><i class="bi bi-clipboard-data me-2"></i>Flood Reports</a></li>
            </ul>
            
            <div class="mt-4 pt-3 border-top border-secondary">
                <a href="log.html" class="nav-link text-white opacity-75 small"><i class="bi bi-box-arrow-left me-2"></i>Sign Out</a>
            </div>
        </nav>
        
        <main class="col-lg-10 col-md-9 ms-sm-auto px-4 main-content">
            
            <div class="d-flex justify-content-between align-items-center mt-3 mb-4">
                <button class="btn btn-danger d-md-none" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                    <i class="bi bi-list"></i>
                </button>
                <h5 class="mb-0 fw-bold text-dark">User Access Management</h5>
                <div class="badge bg-success p-2 px-3 shadow-sm"><i class="bi bi-shield-check me-1"></i> System Secure</div>
            </div>

            <div class="row g-4">
                <div class="col-xl-4 col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white py-3" id="formHeader">
                            <i class="bi bi-person-plus me-2"></i> Create New Account
                        </div>
                        <div class="card-body p-4">
                            <form id="userForm">
                                <input type="hidden" id="userId">
                                
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Username</label>
                                    <div class="input-group shadow-sm border rounded">
                                        <span class="input-group-text bg-white border-0"><i class="bi bi-person text-muted"></i></span>
                                        <input type="text" id="username" class="form-control border-0" placeholder="Enter username" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Access Password</label>
                                    <div class="input-group shadow-sm border rounded">
                                        <span class="input-group-text bg-white border-0"><i class="bi bi-key text-muted"></i></span>
                                        <input type="password" id="password" class="form-control border-0" placeholder="Create password" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label small fw-bold">Account Role</label>
                                    <select id="userType" class="form-select shadow-sm" required>
                                        <option value="" selected disabled>Choose role...</option>
                                        <option value="Admin">Administrator</option>
                                        <option value="User">Standard User</option>
                                    </select>
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" id="submitBtn" class="btn btn-danger py-2 fw-bold">Save Account</button>
                                    <button type="button" id="cancelBtn" class="btn btn-light text-muted border py-2" style="display:none;" onclick="resetUserForm()">Cancel Edit</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-xl-8 col-lg-7">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                                <h6 class="fw-bold mb-0 text-maroon" style="color: #800000;">Registered Accounts</h6>
                                <div class="input-group" style="max-width: 300px;">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                                    <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Filter users...">
                                </div>
                            </div>

                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead>
                                        <tr>
                                            <th>Username</th>
                                            <th>Role</th>
                                            <th class="text-end">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="userTable">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcayr5NOjbrAuLn7bkUovRWVyG4O9wMPk",
        authDomain: "flooded-95eeb.firebaseapp.com",
        projectId: "flooded-95eeb",
        storageBucket: "flooded-95eeb.firebasestorage.app",
        messagingSenderId: "142547476223",
        appId: "1:142547476223:web:70de7014c664e26d0636ca"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userRef = db.ref("users");

    const form = document.getElementById("userForm");
    const table = document.getElementById("userTable");
    const submitBtn = document.getElementById("submitBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const formHeader = document.getElementById("formHeader");

    form.addEventListener("submit", function(e){
        e.preventDefault();
        const UID = document.getElementById("userId").value;
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        const type = document.getElementById("userType").value;
        const data = { user, pass, type };

        if(UID){
            userRef.child(UID).update(data);
        } else {
            userRef.push(data);
        }
        resetUserForm();
    });

    userRef.on("value", snapshot => {
        table.innerHTML = "";
        snapshot.forEach(child => {
            const data = child.val();
            const key = child.key;
            const badgeClass = data.type === 'Admin' ? 'bg-danger' : 'bg-primary';

            table.innerHTML += `
                <tr>
                    <td class="fw-bold text-dark">${data.user}</td>
                    <td><span class="badge ${badgeClass} opacity-75">${data.type}</span></td>
                    <td class="text-end">
                        <button class="btn btn-outline-dark btn-sm me-1" title="View" onclick="viewUser('${data.user}','${data.type}')"><i class="bi bi-eye"></i></button>
                        <button class="btn btn-outline-warning btn-sm me-1" title="Edit" onclick="editUser('${key}','${data.user}','${data.pass}','${data.type}')"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-outline-danger btn-sm" title="Delete" onclick="deleteUser('${key}')"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `;
        });
    });

    function deleteUser(id){
        if(confirm("Permanently delete this user account?")){
            userRef.child(id).remove();
        }
    }

    function editUser(id, username, password, type){
        document.getElementById("userId").value = id;
        document.getElementById("username").value = username;
        document.getElementById("password").value = password;
        document.getElementById("userType").value = type;
        
        formHeader.innerHTML = '<i class="bi bi-pencil-square me-2"></i> Edit Account';
        submitBtn.innerText = "Update Changes";
        submitBtn.className = "btn btn-warning fw-bold py-2";
        cancelBtn.style.display = "block";
    }

    function resetUserForm() {
        form.reset();
        document.getElementById("userId").value = "";
        formHeader.innerHTML = '<i class="bi bi-person-plus me-2"></i> Create New Account';
        submitBtn.innerText = "Save Account";
        submitBtn.className = "btn btn-danger fw-bold py-2";
        cancelBtn.style.display = "none";
    }

    function viewUser(username, type){
        alert("Account Summary\n------------------\nUsername: " + username + "\nRole: " + type);
    }

    document.getElementById("searchInput").addEventListener("keyup", function(){
        let value = this.value.toLowerCase();
        let rows = document.querySelectorAll("#userTable tr");
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
        });
    });
</script>

</body>
</html>
