<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
  let model, minVals = [], maxVals = [];

  window.onload = function() {
    loadModel();
    // if (sessionStorage.getItem('loggedIn') !== 'true') {
    //   window.location.href = 'log.html';
    // }
    // document.getElementById("emails").innerHTML=sessionStorage.getItem("userEmail");
  };
  
  const firebaseConfig = {
    apiKey: "AIzaSyBcayr5NOjbrAuLn7bkUovRWVyG4O9wMPk",
    authDomain: "flooded-95eeb.firebaseapp.com",
    projectId: "flooded-95eeb",
    storageBucket: "flooded-95eeb.firebasestorage.app",
    messagingSenderId: "142547476223",
    appId: "1:142547476223:web:70de7014c664e26d0636ca"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const storageRef = firebase.storage().ref();

  async function loadModel() {
    try {
      const jsonUrl = await storageRef.child('models/flood_model.json').getDownloadURL();
      const weightsUrl = await storageRef.child('models/flood_weights.bin').getDownloadURL();
      const config = await (await fetch(jsonUrl)).json();
      const weights = await (await fetch(weightsUrl)).arrayBuffer();
      
      minVals = config.metadata.minVals;
      maxVals = config.metadata.maxVals;
      
      model = await tf.loadLayersModel(tf.io.fromMemory({
        modelTopology: config.modelTopology,
        weightSpecs: config.weightSpecs,
        weightData: weights
      }));
      console.log("Model loaded for map overlays.");
    } catch (err) {
      console.error("Model load error:", err);
    }
  }

  function normalize(row) {
    return row.map((v, i) => (maxVals[i] - minVals[i]) === 0 ? 0 : (v - minVals[i]) / (maxVals[i] - minVals[i]));
  }

  async function getForecast(currentInput) {
    const horizons = [1, 3, 12, 24];
    let last = [...currentInput];
    const predictions = [];
    if (!model) return [0, 0, 0, 0];
    for (const h of horizons) {
      const pred = await model.predict(tf.tensor2d([normalize(last)])).data();
      predictions.push(pred[0] * 100);
      last[0] += 0.05; 
    }
    return predictions;
  }
  
  mapboxgl.accessToken = 'pk.eyJ1IjoibGhlc3RlcjA4IiwiYSI6ImNtaHFmc3BncjBwZGQybHM0NWN3ejNoNnIifQ.2kEE1OBDTgpnse5-F8QGeg';
  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/lhester08/cmhqgzq0r004601su4m8i8ov1',
    center: [120.716062, 18.106858],
    zoom: 9.5,
    pitch: 55
  });
  
  // Risk categorization logic
  const getRiskCategory = (v) => {
    if(v >= 90) return 'severe';
    if(v >= 50) return 'high';
    if(v >= 20) return 'moderate';
    return 'low';
  };
  
  const getFloodColor = (v) => {
    if(v >= 90) return 'rgba(255,0,0,0.6)';
    if(v >= 50) return 'rgba(255, 140, 0, 0.6)';
    if(v >= 20) return 'rgba(255,255,0,0.6)';
    return 'rgba(2, 251, 2, 0.6)';
  };
  
  const floodLayers = [];
  
  map.on('load', () => {
    // Add Terrain
if (!map.getSource('mapbox-dem')) {
    map.addSource('mapbox-dem', {
        'type': 'raster-dem',
        'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
        'tileSize': 512,
        'maxzoom': 14
    });
}
    // Moves the zoom and compass controls to the bottom-right corner
    map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
    map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });
    
    // Load Firebase Flooded Areas
    db.ref('Flooded_Areas').once('value').then(snapshot => {
      const data = snapshot.val();
      if (!data) return;
      
      Object.entries(data).forEach(([id, f], i) => {
        const geo = f.geojson;
        if (!geo) return;
        
        const sourceId = `flood-src-${i}`;
        const layerId = `flood-layer-${i}`;
        map.addSource(sourceId, { type: 'geojson', data: geo });
        
        if (f.type?.toLowerCase() === 'municipality') {
          map.addLayer({
            id: `border-${i}`,
            type: 'line',
            source: sourceId,
            paint: { 'line-color': '#1c96c5', 'line-width': 2 }
          });
        } else {
          map.addLayer({
            id: layerId,
            type: 'fill',
            source: sourceId,
            paint: { 
              'fill-color': getFloodColor(f.vulnerability || 0), 
              'fill-opacity': 0.5 
            }
          });
          // Store layer ID and vulnerability for filtering later
          floodLayers.push({ layerId, props: f });
        }
      });
    });
  });
  
  // Checkbox Toggle Logic
  document.querySelectorAll('.risk-filter').forEach(checkbox => {
    checkbox.addEventListener('change', () => {
      // Get all currently checked categories
      const activeCategories = Array.from(document.querySelectorAll('.risk-filter:checked')).map(cb => cb.value);
      
      floodLayers.forEach(item => {
        const vuln = item.props.vulnerability || 0;
        const category = getRiskCategory(vuln);
        
        if (activeCategories.includes(category)) {
          map.setLayoutProperty(item.layerId, 'visibility', 'visible');
        } else {
          map.setLayoutProperty(item.layerId, 'visibility', 'none');
        }
      });
    });
  });
  
  // Interaction Logic: Risk based on Elevation
  map.on('click', async (e) => {
    // Close all existing popups before showing another one
    document.querySelectorAll('.mapboxgl-popup').forEach(p => p.remove());
    const { lng, lat } = e.lngLat;
    const elevation = map.queryTerrainElevation(e.lngLat) || 0;
    
    const minElev = 5; 
    const maxElev = 50; 
    
    let calcRisk = 0;
    if (elevation <= minElev) {
      calcRisk = 100;
    } else if (elevation >= maxElev) {
      calcRisk = 5; 
    } else {
      calcRisk = 100 - ((elevation - minElev) / (maxElev - minElev) * 100);
    }
    const finalRisk = Math.round(calcRisk);
    
    let riskColor, riskLabel, badgeClass;
    if (finalRisk >= 90) { 
      riskColor = '#ff0000'; riskLabel = 'Severe'; badgeClass = 'bg-danger'; 
    } else if (finalRisk >= 50) { 
      riskColor = '#ffa500'; riskLabel = 'High'; badgeClass = 'bg-warning text-dark'; 
    } else if (finalRisk >= 20) { 
      riskColor = '#ffff00'; riskLabel = 'Moderate'; badgeClass = 'bg-warning text-dark'; 
    } else { 
      riskColor = '#02fb02'; riskLabel = 'Safe'; badgeClass = 'bg-success'; 
    }
    
    const geoQuery = `https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${mapboxgl.accessToken}&types=address,neighborhood,locality`;
    
    let address = "Scanning...";
    let barangay = "N/A";
    let municipality = "N/A";
    
    try {
      const resp = await fetch(geoQuery);
      const data = await resp.json();
      if (data.features && data.features.length > 0) {
        address = data.features[0].place_name.split(',')[0];
        data.features[0].context.forEach(ctx => {
          if (ctx.id.includes('neighborhood')) barangay = ctx.text;
          if (ctx.id.includes('place')) municipality = ctx.text;
        });
      }
    } catch (err) { address = "Location unavailable"; }
    
    const html = `
        <div style="padding:10px; min-width: 230px;">
            <h6 class="fw-bold border-bottom mb-2 pb-1" style="color: #1c96c5;">
                <i class="bi bi-water me-1"></i> Elevation Analysis
            </h6>
            
            <div class="mb-2">
                <span class="d-block fw-bold text-dark">${municipality}</span>
                <span class="badge bg-secondary opacity-75" style="font-size:0.7rem;">Brgy. ${barangay}</span>
            </div>

            <div class="row g-0 mb-3 border-top pt-2">
                <div class="col-6 border-end">
                    <small class="text-muted d-block" style="font-size: 0.6rem;">ALTITUDE</small>
                    <span class="fw-bold ${elevation < 10 ? 'text-danger' : ''}">${elevation.toFixed(1)}m ASL</span>
                </div>
                <div class="col-6 ps-2">
                    <small class="text-muted d-block" style="font-size: 0.6rem;">RISK LEVEL</small>
                    <span class="badge ${badgeClass}" style="font-size:0.65rem;">${riskLabel}</span>
                </div>
            </div>

            <div class="p-2 rounded border shadow-sm" style="background: #f8f9fa;">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <small class="fw-bold text-uppercase" style="font-size:0.65rem;">Flood Risk Index</small>
                    <small class="fw-bold" style="color: ${riskColor === '#ffff00' ? '#b8b800' : riskColor};">${finalRisk}%</small>
                </div>
                <div class="progress" style="height: 8px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" 
                         style="width: ${finalRisk}%; background-color: ${riskColor};"></div>
                </div>
                <small class="text-muted d-block mt-1" style="font-size: 0.6rem;">*Computed via Spatio-temporal Elevation Data</small>
            </div>
        </div>`;
    
    new mapboxgl.Popup({ maxWidth: '300px' })
    .setLngLat(e.lngLat)
    .setHTML(html)
    .addTo(map);
  });
  
  // Store live data history and current values from Firebase
  const liveDataStore = {
    data: { history: [0, 0, 0, 0, 0], current: { level: 0, flow: 0, rain: 0 } },
    data2: { history: [0, 0, 0, 0, 0], current: { level: 0, flow: 0, rain: 0 } },
    data3: { history: [0, 0, 0, 0, 0], current: { level: 0, flow: 0, rain: 0 } }
  };

  // Setup listeners for live Firebase nodes (Pasuquin, Laoag, Bacarra)
  ['data', 'data2', 'data3'].forEach(nodeKey => {
    db.ref(nodeKey).orderByKey().limitToLast(5).on('value', snapshot => {
      if (!snapshot.exists()) return;
      const entries = [];
      snapshot.forEach(child => entries.push(child.val()));
      liveDataStore[nodeKey].history = entries.map(e => e.level ?? e.water ?? 0);
      const latest = entries[entries.length - 1];
      liveDataStore[nodeKey].current = {
        level: latest.level ?? latest.water ?? 0,
        flow: latest.flow ?? latest.discharge ?? 0,
        rain: latest.rain ?? latest.rainfall ?? 0
      };
    });
  });

  // River configuration mapping to Firebase data nodes
  const rivers = [
    { name: "Baldi River", lat: 18.337086, lng: 120.613098, node: 'data' },
    { name: "Padsan River", lat: 18.192422, lng: 120.591328, node: 'data2' },
    { name: "Bislak River", lat: 18.247178, lng: 120.622658, node: 'data3' }
  ];
  
  const riverMenu = document.getElementById('riverDropdownMenu');
  
  rivers.forEach((river, idx) => {
    const histChartId = `riverHist-${idx}`;
    const probChartId = `riverProb-${idx}`;
    const popup = new mapboxgl.Popup({ offset: 25 });

    const marker = new mapboxgl.Marker({ color: '#1c96c5' })
    .setLngLat([river.lng, river.lat])
    .setPopup(popup)
    .addTo(map);
    
    const li = document.createElement('li');
    li.innerHTML = `<a class="dropdown-item small" href="#"><i class="bi bi-geo-alt text-danger"></i> ${river.name}</a>`;
    li.onclick = () => {
      map.flyTo({ center: [river.lng, river.lat], zoom: 14 });
      if (!marker.getPopup().isOpen()) marker.togglePopup();
    };
    riverMenu.appendChild(li);
    
    popup.on('open', async () => {
      // Close all existing popups before showing another one
      const currentPopupEl = popup.getElement();
      document.querySelectorAll('.mapboxgl-popup').forEach(p => {
        if (p !== currentPopupEl) p.remove();
      });

      const data = liveDataStore[river.node];
      const cur = data.current;
      const prob = Math.round(levelToProb(cur.level));
      const history = data.history;

      popup.setHTML(`
        <div class="popup-chart-container">
            <h6 class="fw-bold mb-2 text-dark border-bottom pb-1" style="font-size: 0.85rem;">${river.name}</h6>
            <div class="d-flex justify-content-between mb-2 text-center border-bottom pb-2">
                <div><small class="text-muted d-block" style="font-size: 0.55rem;">LEVEL</small><strong style="font-size: 0.75rem;">${cur.level}m</strong></div>
                <div><small class="text-muted d-block" style="font-size: 0.55rem;">FLOW</small><strong style="font-size: 0.75rem;">${cur.flow}</strong></div>
                <div><small class="text-muted d-block" style="font-size: 0.55rem;">RAIN</small><strong style="font-size: 0.75rem;">${cur.rain}</strong></div>
                <div><small class="text-muted d-block" style="font-size: 0.55rem;">PROB</small><strong class="text-danger" style="font-size: 0.75rem;">${prob}%</strong></div>
            </div>
            <span hidden class="chart-label">Daily Historical Metrics</span>
            <canvas hidden id="${histChartId}" class="popup-chart"></canvas>
            <div class="mt-2 border-top pt-2">
                <span class="chart-label">Hourly Forecast Probability</span>
                <canvas id="${probChartId}" class="popup-chart"></canvas>
            </div>
        </div>
      `);

      setTimeout(() => {
        // 1. Initialize Historical Chart
        const hCtx = document.getElementById(histChartId);
        new Chart(hCtx, {
          type: 'line',
          data: {
            labels: ["-4h", "-3h", "-2h", "-1h", "Now"],
            datasets: [
              { 
                label: 'Level', data: history, borderColor: '#1f77b4', 
                backgroundColor: 'rgba(31, 119, 180, 0.1)', fill: true, tension: 0.4, pointRadius: 2 
              },
              { 
                label: 'Rain', data: history.map(v => v * 15), borderColor: '#2ca02c', 
                borderDash: [3, 3], fill: false, tension: 0.4, pointRadius: 0 
              }
            ]
          },
          options: {
            plugins: { legend: { display: true, labels: { boxWidth: 8, font: { size: 9 } } } },
            maintainAspectRatio: false,
            scales: {
              x: { grid: { display: false }, ticks: { font: { size: 8 } } },
              y: { ticks: { font: { size: 8 } } }
            }
          }
        });

        const pCtx = document.getElementById(probChartId);
        new Chart(pCtx, {
          type: 'line',
          data: {
            labels: ["Now", "+3h", "+12h", "+24h"],
            datasets: [{
                label: 'Prob %',
                data: forecastData,
                borderColor: '#dc3545',
                backgroundColor: 'rgba(220, 53, 69, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 3
            }]
          },
          options: {
            plugins: { legend: { display: false } },
            maintainAspectRatio: false,
            scales: {
              x: { grid: { display: false }, ticks: { font: { size: 8 } } },
              y: { beginAtZero: true, max: 100, ticks: { font: { size: 8 } } }
            }
          }
        });
      }, 200); 
    });
  });
  
  document.getElementById('logoutLink').addEventListener('click', function(e) {
    e.preventDefault();
    sessionStorage.clear(); 
    window.location.href = 'log.html'; 
  });
  function logoutUser(){
    sessionStorage.clear(); 
    window.location.href = 'log.html'; 
  }
</script>

</body>
</html>
