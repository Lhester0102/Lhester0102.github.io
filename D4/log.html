<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Flood DSS</title>
  <link rel="icon" type="image/x-icon" href="GDSS.png">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
  
  <div class="container-fluid vh-100">
    <div class="row h-100">
      
      <!-- LEFT PANEL -->
      <div style="background-color:#800000;" class="col-md-7 d-none d-md-flex flex-column justify-content-center align-items-center text-white">
        <h1 class="mb-3">Flash Floods GDSS</h1>
        <p class="lead text-center">A Geospatial Decision Support System for Flood Monitoring</p>
        <img src="gds.png" class="rounded-circle img-fluid" style="max-width:350px;">
      </div>
      
      <!-- RIGHT PANEL: LOGIN FORM -->
      <div class="col-md-5 d-flex justify-content-center align-items-center">
        <div class="card shadow-sm p-4 w-75" style="max-width: 400px;">
          <h4 class="text-center mb-4">Login</h4>
          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" class="form-control form-control-sm" placeholder="Enter email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" class="form-control form-control-sm" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-danger w-100">Login</button>
            <div class="text-center mt-2">
              <a href="#" class="small">Forgot password?</a>
            </div>
          </form>
        </div>
      </div>
      
    </div>
  </div>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  
  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBcayr5NOjbrAuLn7bkUovRWVyG4O9wMPk",
      authDomain: "flooded-95eeb.firebaseapp.com",
      projectId: "flooded-95eeb",
      storageBucket: "flooded-95eeb.firebasestorage.app",
      messagingSenderId: "142547476223",
      appId: "1:142547476223:web:70de7014c664e26d0636ca",
      measurementId: "G-MRFYTR1F5K"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    document.addEventListener('DOMContentLoaded', function() {
      
      // Check if user is already logged in
      if(sessionStorage.getItem('loggedIn') === 'true'){
        window.location.href = "newd.html";
      }
      
      // Login form submit
      document.getElementById('loginForm').addEventListener('submit', function(e){
        e.preventDefault();
        const emailInput = document.getElementById('email').value;
        const passwordInput = document.getElementById('password').value;
        
        const usersRef = database.ref('users');
        usersRef.once('value')
        .then(snapshot => {
          const users = snapshot.val();
          console.log("Users from Firebase:", users);
          
          if(!users){
            alert("No users found in database");
            return;
          }
          
          let authenticated = false;
          for(let key in users){
            console.log("Checking:", users[key].user, users[key].pass);
            if(users[key].user == emailInput && users[key].pass == passwordInput){
              authenticated = true;
              sessionStorage.setItem('loggedIn', 'true');
              sessionStorage.setItem('userEmail', emailInput);
              break;
            }
          }
          
          if(authenticated){
            alert("Login successful!");
            window.location.href = "newd.html";
          } else {
            alert("Invalid email or password");
          }
        })
        .catch(error => {
          console.error("Firebase read error:", error);
        });
        
      });
      
    });
  </script>
  
</body>
</html>
