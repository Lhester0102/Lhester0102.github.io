<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Geospatial DSS | Flood Reports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="GDSS.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* Theme Core */
        body { background: #f4f6f9; min-height: 100vh; overflow-x: hidden; }
        
        /* Sidebar Styles */
        .sidebar { 
            background-color: #800000; 
            transition: all 0.3s;
            z-index: 1050;
            overflow-y: auto;
        }
        
        .nav-link { 
            color: rgba(255,255,255,0.8); 
            transition: 0.2s; 
            border-radius: 5px; 
            margin-bottom: 2px; 
        }
        
        .nav-link:hover { 
            background-color: #212529; 
            color: #fff; 
        }
        
        .nav-link.active { 
            background-color: #212529 !important; 
            color: white !important; 
        }
        
        /* Card & UI Refinement */
        .card { border: none; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { border-top-left-radius: 14px !important; border-top-right-radius: 14px !important; font-weight: bold; }
        
        /* Table Aesthetics (Matched to System Design) */
        .table thead th { 
            background-color: #212529; 
            color: white; 
            font-size: 0.85rem;
            padding: 15px;
            border-bottom: none;
        }
        .table tbody td { font-size: 0.85rem; vertical-align: middle; padding: 12px 15px; }
        
        /* Specific Badges for Flood Data */
        .badge-metric { padding: 6px 10px; border-radius: 6px; font-weight: 600; font-size: 0.75rem; }
        .lvl-high { background: #ffebee; color: #c62828; }
        .lvl-med { background: #fff3e0; color: #ef6c00; }
        .lvl-low { background: #e8f5e9; color: #2e7d32; }
        
        /* Responsive Layout Logic */
        @media (min-width: 768px) {
            .sidebar { min-height: 100vh; height: 100vh; }
            .main-content { height: 100vh; overflow-y: auto; }
        }
        
        /* Small Sidebar Branding for Mobile */
        .mobile-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        .mobile-brand img { width: 35px; height: 35px; }
        .mobile-brand h6 { margin: 0; font-size: 0.9rem; font-weight: bold; }
        
        /* Custom Scrollbar */
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-lg-2 col-md-3 text-white p-3 sidebar collapse d-md-block" id="sidebarMenu">
                
                <div class="d-md-none mobile-brand">
                    <img src="gds.png" class="rounded-circle border border-light" alt="Logo">
                    <div>
                        <h6 class="text-white">Geospatial DSS</h6>
                        <small class="text-white-50" style="font-size: 0.7rem;">Flood Reports</small>
                    </div>
                    <button class="btn btn-link text-white ms-auto p-0" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                
                <div class="text-center mb-4 d-none d-md-block">
                    <img src="gds.png" class="rounded-circle w-75 mb-2 border shadow-sm" alt="Logo">
                    <h6 class="fw-bold mb-0">Geospatial DSS</h6>
                </div>
                
                <ul class="nav flex-column">
                    <li class="mb-1"><a class="nav-link text-white" href="newd.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                    <li class="mb-1"><a class="nav-link text-white" href="index.html"><i class="bi bi-map me-2"></i>Map Overlay</a></li>
                    
                    <li class="nav-item">
                        <a class="nav-link text-white" data-bs-toggle="collapse" href="#manageMenu">
                            <i class="bi bi-gear me-2"></i> Manage <i class="bi bi-chevron-down float-end"></i>
                        </a>
                        <div class="collapse" id="manageMenu">
                            <ul class="list-unstyled ps-3 small">
                                <li><a href="municipalities.html" class="nav-link text-white-50 py-1">Municipalities</a></li>
                                <li><a href="upload2.html" class="nav-link text-white-50 py-1">Upload GeoJSON</a></li>
                            </ul>
                        </div>
                    </li>
                    <li class="mb-1"><a class="nav-link text-white" href="users.html"><i class="bi bi-people me-2"></i>Users</a></li>
                    <li class="mb-1"><a class="nav-link text-white active" href="reports.html"><i class="bi bi-clipboard-data me-2"></i>Flood Reports</a></li>
                </ul>
                
                <div class="mt-4 pt-3 border-top border-secondary">
                    <a id="logoutLink" href="log.html" class="nav-link text-white opacity-75 small"><i class="bi bi-box-arrow-left me-2"></i>Sign Out</a>
                </div>
            </nav>
            
            <main class="col-lg-10 col-md-9 ms-sm-auto px-4 main-content">
                
                <div class="d-flex justify-content-between align-items-center mt-3 mb-4">
                    <button class="btn btn-danger d-md-none me-2" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                        <i class="bi bi-list"></i>
                    </button>
                    <h5 class="mb-0 fw-bold text-dark me-auto">Flood Reports (Live Data)</h5>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary" onclick="window.print()"><i class="bi bi-printer me-1"></i> Print</button>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead>
                                    <tr>
                                        <th class="ps-4">Date & Time</th>
                                        <th>Water Level</th>
                                        <th>Rainfall (mm)</th>
                                        <th>Flow/Discharge</th>
                                        <th>Calculated Depth</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="flood-data-table">
                                    <tr>
                                        <td colspan="6" class="text-center py-4 text-muted">Connecting to Firebase...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // Session Guard
        window.onload = function() {
            if (sessionStorage.getItem('loggedIn') !== 'true') {
                window.location.href = 'log.html';
            }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyBcayr5NOjbrAuLn7bkUovRWVyG4O9wMPk",
            authDomain: "flooded-95eeb.firebaseapp.com",
            projectId: "flooded-95eeb",
            storageBucket: "flooded-95eeb.firebasestorage.app",
            messagingSenderId: "142547476223",
            appId: "1:142547476223:web:70de7014c664e26d0636ca"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'data');
        
        function getDepthInfo(level) {
            const l = parseFloat(level);
            if (l >= 4.0) return { label: 'High Risk', class: 'lvl-high', depthCalc: (l * 0.8).toFixed(2) + ' m' };
            if (l >= 2.5) return { label: 'Warning', class: 'lvl-med', depthCalc: (l * 0.4).toFixed(2) + ' m' };
            return { label: 'Safe', class: 'lvl-low', depthCalc: '0.00 m' };
        }
        
        onValue(dataRef, (snapshot) => {
            const tableBody = document.getElementById('flood-data-table');
            tableBody.innerHTML = ''; 
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                const rows = Object.keys(data).map(key => data[key]);
                
                rows.reverse().forEach(item => {
                    const depthMeta = getDepthInfo(item.level);
                    
                    const rowHTML = `
                        <tr>
                            <td class="ps-4">
                                <div class="fw-bold text-dark">${item.date || 'N/A'}</div>
                                <small class="text-muted">${item.time || ''}</small>
                            </td>
                            <td><span class="badge-metric ${depthMeta.class}">${item.level} m</span></td>
                            <td>${item.rain} mm</td>
                            <td>${item.flow} m³/s</td>
                            <td class="fw-bold text-dark">${depthMeta.depthCalc}</td>
                            <td><span class="badge rounded-pill ${depthMeta.class}">${depthMeta.label}</span></td>
                        </tr>
                    `;
                    tableBody.innerHTML += rowHTML;
                });
            } else {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No records found in Firebase.</td></tr>';
            }
        });
        
        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.clear();
            window.location.href = 'log.html';
        });
    </script>
</body>
</html>
