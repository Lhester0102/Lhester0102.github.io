<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geospatial DSS | Municipal Boundaries</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="GDSS.png">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
  
  <style>
    /* Theme Core */
    body { background: #f4f6f9; min-height: 100vh; overflow-x: hidden; }
    
    /* Sidebar Styles (Theme Consistent) */
    .sidebar { 
      background-color: #800000; 
      transition: all 0.3s;
      z-index: 1050;
      overflow-y: auto;
    }
    .nav-link { 
      color: rgba(255,255,255,0.8); 
      transition: 0.2s; 
      border-radius: 5px; 
      margin-bottom: 2px; 
    }
    .nav-link:hover { 
      background-color: #212529; 
      color: #fff; 
    }
    .nav-link.active { 
      background-color: #212529 !important; 
      color: white !important; 
    }
    
    /* Card & UI Refinement */
    .card { border: none; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .top-bar { background: white; border-radius: 12px; padding: 12px 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
    
    /* Map Container */
    #map { width: 100%; height: 100%; border-radius: 10px; min-height: 400px; }
    
    /* Desktop vs Mobile Scrolling Fix */
    @media (min-width: 768px) {
      body { height: 100vh; overflow: hidden; }
      .sidebar { min-height: 100vh; height: 100vh; }
      .main-content { height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
      .map-container-row { flex-grow: 1; margin-bottom: 20px; }
    }
    
    @media (max-width: 767.98px) {
      .main-content { padding-bottom: 40px; }
      #map { height: 500px; }
    }
  </style>
</head>

<body>
  
  <div class="container-fluid">
    <div class="row">
      
      <nav class="col-lg-2 col-md-3 text-white p-3 sidebar collapse d-md-block" id="sidebarMenu">
        
        <div class="d-md-none mobile-brand">
          <img src="gds.png" class="rounded-circle border border-light" alt="Logo">
          <div>
            <h6 class="text-white">Geospatial DSS</h6>
            <small class="text-white-50" style="font-size: 0.7rem;">User Management</small>
          </div>
          <button class="btn btn-link text-white ms-auto p-0" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        
        <div class="text-center mb-4 d-none d-md-block">
          <img src="gds.png" class="rounded-circle w-75 mb-2 border shadow-sm" alt="Logo">
          <h6 class="fw-bold mb-0">Geospatial DSS</h6>
          <!-- <small class="opacity-75">Admin Portal</small> -->
        </div>
        
        <ul class="nav flex-column">
          <li class="mb-1"><a class="nav-link text-white" href="newd.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li class="mb-1"><a class="nav-link text-white" href="index.html"><i class="bi bi-map me-2"></i>Map Overlay</a></li>
          
          <li class="nav-item">
            <a class="nav-link text-white active" data-bs-toggle="collapse" href="#manageMenu">
              <i class="bi bi-gear me-2"></i> Manage <i class="bi bi-chevron-down float-end"></i>
            </a>
            <div class="collapse show" id="manageMenu">
              <ul class="list-unstyled ps-3 small">
                <li><a href="municipalities.html" class="nav-link text-white-50 active py-1">Municipalities</a></li>
                <li><a href="upload2.html" class="nav-link text-white-50 py-1">Upload GeoJSON</a></li>
              </ul>
            </div>
          </li>
          <li class="mb-1"><a class="nav-link text-white" href="users.html"><i class="bi bi-people me-2"></i>Users</a></li>
          <li class="mb-1"><a class="nav-link text-white" href="reports.html"><i class="bi bi-clipboard-data me-2"></i>Flood Reports</a></li>
        </ul>
        
        <div class="mt-4 pt-3 border-top border-secondary">
          <a id ="logoutLink" href="log.html" class="nav-link text-white opacity-75 small"><i class="bi bi-box-arrow-left me-2"></i>Sign Out</a>
        </div>
      </nav>
      
      <main class="col-lg-10 col-md-9 ms-sm-auto px-4 main-content">
        
        <div class="d-flex justify-content-between align-items-center mt-1 mb-1 p-2 bg-white rounded shadow">
          <div class="d-flex align-items-center gap-3">
            <button style="background-color: #800000; color: #fff;" class="btn d-md-none" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
              <i class="bi bi-list"></i>
            </button>
            
            <div class="d-flex align-items-baseline gap-2">
              <h5 class="mb-0 fw-bold text-dark">Municipal Boundaries</h5>
              <span id="lastUpdated" class="text-muted small">
              </span>
            </div>
          </div>
          
          <div class="dropdown">
            <button
            class="btn dropdown-toggle btn-sm border shadow-sm d-flex align-items-center gap-2 px-3 py-2" 
            type="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i>
            <span id="emails">User Loading...</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
            <li><h6 class="dropdown-header text-uppercase small fw-bold">Account Status</h6></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item small" href="#"><i class="bi bi-person me-2 text-danger"></i>Profile</a></li>
            <li><a class="dropdown-item small text-danger fw-bold" href="#" onclick="logoutUser()"><i class="bi bi-box-arrow-left me-2"></i>Sign Out</a></li>
          </ul>
        </div>
      </div>
        
        <div class="top-bar d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center">
            <i class="bi bi-geo-alt-fill text-danger me-2"></i>
            <span class="text-muted small fw-bold text-uppercase">Region Focus: Ilocos Norte</span>
          </div>
          
          <div class="dropdown">
            <button class="btn btn-dark btn-sm dropdown-toggle shadow-sm px-3" data-bs-toggle="dropdown">
              <i class="bi bi-search me-1"></i> Select Municipality
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0" id="areaDropdown" style="max-height:300px; overflow-y:auto;">
            </ul>
          </div>
        </div>
        
        <div class="row map-container-row flex-grow-1">
          <div class="col-12 h-100 mb-3">
            <div class="card h-100 p-1">
              <div id="map"></div>
            </div>
          </div>
        </div>
        
      </main>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    window.onload = function() {
      // Check if the user is logged in
      if (sessionStorage.getItem('loggedIn') !== 'true') {
        // Redirect to login page if session is not set
        window.location.href = 'log.html';
      }
      document.getElementById("emails").innerHTML=sessionStorage.getItem("userEmail");
    };
    // Firebase Init
    const firebaseConfig = {
      apiKey: "AIzaSyBcayr5NOjbrAuLn7bkUovRWVyG4O9wMPk",
      authDomain: "flooded-95eeb.firebaseapp.com",
      projectId: "flooded-95eeb",
      storageBucket: "flooded-95eeb.firebasestorage.app",
      messagingSenderId: "142547476223",
      appId: "1:142547476223:web:70de7014c664e26d0636ca"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Mapbox Init
    mapboxgl.accessToken = 'pk.eyJ1IjoibGhlc3RlcjA4IiwiYSI6ImNtaHFmc3BncjBwZGQybHM0NWN3ejNoNnIifQ.2kEE1OBDTgpnse5-F8QGeg';
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/lhester08/cmhqgzq0r004601su4m8i8ov1',
      center: [120.716062, 18.106858],
      zoom: 9.5,
      pitch: 45
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');
    
    function getColor(v) {
      if (v >= 80) return '#800000';
      if (v >= 60) return '#BD0026';
      if (v >= 40) return '#E31A1C';
      if (v >= 20) return '#FC4E2A';
      return '#28a745';
    }
    
    function getCentroid(coords) {
      let flat = coords.flat(3);
      let lons = flat.filter((_, i) => i % 2 === 0);
      let lats = flat.filter((_, i) => i % 2 === 1);
      return [
      lons.reduce((a,b)=>a+b,0)/lons.length,
      lats.reduce((a,b)=>a+b,0)/lats.length
      ];
    }
    
    let currentLayerId = null;
    
    function showArea(key, f){
      if (!f.geojson) return;
      
      if (currentLayerId) {
        if (map.getLayer(currentLayerId)) map.removeLayer(currentLayerId);
        if (map.getSource(currentLayerId)) map.removeSource(currentLayerId);
      }
      
      currentLayerId = 'area-' + key;
      
      map.addSource(currentLayerId, { type: 'geojson', data: f.geojson });
      
      map.addLayer({
        id: currentLayerId,
        type: 'fill',
        source: currentLayerId,
        paint: {
          'fill-color': getColor(f.vulnerability || 0),
          'fill-opacity': 0.6,
          'fill-outline-color': '#fff'
        }
      });
      
      let coords = f.geojson.type === "Feature"
      ? f.geojson.geometry.coordinates
      : f.geojson.features[0].geometry.coordinates;
      
      map.flyTo({
        center: getCentroid(coords),
        zoom: 12,
        speed: 0.8,
        essential: true
      });
    }
    
    db.ref('Flooded_Areas').on('value', snapshot => {
      const data = snapshot.val();
      const dropdown = document.getElementById('areaDropdown');
      dropdown.innerHTML = '';
      
      if (!data) return;
      
      Object.keys(data).forEach(key => {
        const f = data[key];
        if (!f.geojson || f.name === "Flooded Areas") return;
        
        const item = document.createElement('li');
        item.innerHTML = `<a class="dropdown-item py-2" href="#"><i class="bi bi-geo me-2"></i>${f.name}</a>`;
        item.onclick = (e) => {
          e.preventDefault();
          showArea(key, f);
        };
        dropdown.appendChild(item);
      });
    });
    document.getElementById('logoutLink').addEventListener('click', function(e) {
      e.preventDefault();
      sessionStorage.clear(); // Clear all session storage
      window.location.href = 'log.html'; // Redirect to login page
    });
  </script>
  
</body>
</html>
